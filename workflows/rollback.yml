name: Rollback Environment

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Ambiente alvo do rollback"
        required: true
        type: choice
        options:
          - dev
          - prod
      rollback_version:
        description: "Versao de artefato para rollback (ex.: main-a1b2c3d ou prod-a1b2c3d)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infra/terraform

jobs:
  rollback:
    name: Rollback via Terraform Artifact Prefix
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    concurrency:
      group: rollback-${{ inputs.target_environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Artifact Prefix
        run: |
          echo "TF_VAR_lambda_artifacts_bucket=${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}" >> "$GITHUB_ENV"
          echo "TF_VAR_lambda_artifacts_prefix=lambdas/${{ inputs.target_environment }}/${{ inputs.rollback_version }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=document-processing/${{ inputs.target_environment }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply Rollback
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var-file="environments/${{ inputs.target_environment }}.tfvars"
