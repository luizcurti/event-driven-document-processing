name: Deploy Infrastructure and Lambdas

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: "Run deployment in production"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infra/terraform

jobs:
  deploy_ephemeral:
    name: Deploy Ephemeral PR Environment
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: ephemeral-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    environment: ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Package Lambda Artifacts
        run: |
          set -euo pipefail
          SAFE_BRANCH=$(echo "${{ github.event.pull_request.head.ref }}" | tr -c '[:alnum:]-' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-20)
          EPHEMERAL_ENV="pr-${{ github.event.pull_request.number }}-${SAFE_BRANCH}"
          VERSION="${EPHEMERAL_ENV}-${GITHUB_SHA::7}"
          PREFIX="lambdas/ephemeral/${VERSION}"
          mkdir -p artifacts
          rm -rf artifacts/bundle
          mkdir -p artifacts/bundle
          cp -R dist/* artifacts/bundle/
          cp -R node_modules artifacts/bundle/node_modules
          cp package.json artifacts/bundle/package.json
          (cd artifacts/bundle && zip -rq ../lambda_bundle.zip .)
          for fn in upload ocr thumbnail validation merge_results metadata notification; do
            aws s3 cp artifacts/lambda_bundle.zip "s3://${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}/${PREFIX}/${fn}.zip"
          done
          echo "TF_VAR_lambda_artifacts_bucket=${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}" >> "$GITHUB_ENV"
          echo "TF_VAR_lambda_artifacts_prefix=${PREFIX}" >> "$GITHUB_ENV"
          echo "TF_VAR_environment=${EPHEMERAL_ENV}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=document-processing/ephemeral/pr-${{ github.event.pull_request.number }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply Ephemeral
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file="environments/dev.tfvars" \
            -var="environment=${TF_VAR_environment}"

  destroy_ephemeral:
    name: Destroy Ephemeral PR Environment
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: ephemeral-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    environment: ephemeral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=document-processing/ephemeral/pr-${{ github.event.pull_request.number }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Destroy Ephemeral
        working-directory: ${{ env.TF_DIR }}
        run: |
          SAFE_BRANCH=$(echo "${{ github.event.pull_request.head.ref }}" | tr -c '[:alnum:]-' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-20)
          EPHEMERAL_ENV="pr-${{ github.event.pull_request.number }}-${SAFE_BRANCH}"
          terraform destroy -auto-approve \
            -var-file="environments/dev.tfvars" \
            -var="environment=${EPHEMERAL_ENV}" \
            -var="lambda_artifacts_bucket=${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}"

  deploy_dev:
    name: Deploy Dev on Main Merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: dev
      cancel-in-progress: false
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Package Lambda Artifacts
        run: |
          set -euo pipefail
          VERSION="main-${GITHUB_SHA::7}"
          PREFIX="lambdas/dev/${VERSION}"
          mkdir -p artifacts
          rm -rf artifacts/bundle
          mkdir -p artifacts/bundle
          cp -R dist/* artifacts/bundle/
          cp -R node_modules artifacts/bundle/node_modules
          cp package.json artifacts/bundle/package.json
          (cd artifacts/bundle && zip -rq ../lambda_bundle.zip .)
          for fn in upload ocr thumbnail validation merge_results metadata notification; do
            aws s3 cp artifacts/lambda_bundle.zip "s3://${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}/${PREFIX}/${fn}.zip"
          done
          echo "TF_VAR_lambda_artifacts_bucket=${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}" >> "$GITHUB_ENV"
          echo "TF_VAR_lambda_artifacts_prefix=${PREFIX}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=document-processing/dev.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply Dev
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var-file="environments/dev.tfvars"

  deploy_prod:
    name: Deploy Prod with Approval
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    concurrency:
      group: prod
      cancel-in-progress: false
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Package Lambda Artifacts
        run: |
          set -euo pipefail
          VERSION="prod-${GITHUB_SHA::7}"
          PREFIX="lambdas/prod/${VERSION}"
          mkdir -p artifacts
          rm -rf artifacts/bundle
          mkdir -p artifacts/bundle
          cp -R dist/* artifacts/bundle/
          cp -R node_modules artifacts/bundle/node_modules
          cp package.json artifacts/bundle/package.json
          (cd artifacts/bundle && zip -rq ../lambda_bundle.zip .)
          for fn in upload ocr thumbnail validation merge_results metadata notification; do
            aws s3 cp artifacts/lambda_bundle.zip "s3://${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}/${PREFIX}/${fn}.zip"
          done
          echo "TF_VAR_lambda_artifacts_bucket=${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}" >> "$GITHUB_ENV"
          echo "TF_VAR_lambda_artifacts_prefix=${PREFIX}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=document-processing/prod.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply Prod
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var-file="environments/prod.tfvars"
